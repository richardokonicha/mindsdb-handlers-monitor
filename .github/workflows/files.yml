name: Files Handler Monitor CI

on:
  push:
    branches: ["main"]
    paths:
      - "files/**"
      - ".github/workflows/files.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "files/**"
      - ".github/workflows/files.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install test reporting plugins
          pip install pytest-html pytest-json-report

      - name: Install & start MindsDB
        run: |
          python -m pip install --upgrade pip

          # Install MindsDB from your fork or main repo
          git clone https://github.com/mindsdb/mindsdb.git
          cd mindsdb
          pip install -e ".[postgres]"

          echo "🚀 Starting MindsDB..."
          MINDSDB_NO_STUDIO=1 python -m mindsdb --api http --verbose > /tmp/mindsdb.log 2>&1 &
          echo "MINDSDB_PID=$!" >> $GITHUB_ENV

          echo "⏳ Waiting for MindsDB to be ready..."
          for i in $(seq 1 180); do
            echo "[$i] Checking MindsDB..."
            if curl -sf http://127.0.0.1:47334/api/status >/dev/null; then
              echo "✅ MindsDB is ready!"
              exit 0
            fi
            sleep 1
          done

          echo "❌ MindsDB failed to start"
          echo "=== MindsDB logs ==="
          cat /tmp/mindsdb.log
          exit 1

      - name: Run tests with result tracking
        env:
          MINDSDB_API_URL: http://localhost:47334
        run: |
          echo "🧪 Running Files handler tests..."

          # Create results directory
          mkdir -p /tmp/test_results

          # Run tests with detailed output and reporting
          cd files/tests
          pytest -v --tb=short \
            --junit-xml=/tmp/test_results/junit.xml \
            || true
          echo "✅ Tests completed"

      - name: Generate test summary
        if: always()
        run: |
          set -eu
          echo "=== Generating Test Summary ==="

          # Initialize counters
          total_tests=0
          passed=0
          failed=0
          errors=0
          skipped=0

          # Check if JUnit XML exists
          if [ -f /tmp/test_results/junit.xml ]; then
            # Parse JUnit XML for test counts
            if command -v python3 &> /dev/null; then
              python3 <<'PYEOF' > /tmp/test_summary.txt
          import xml.etree.ElementTree as ET
          import sys

          try:
              tree = ET.parse('/tmp/test_results/junit.xml')
              root = tree.getroot()
              
              # Get test suite stats
              testsuite = root.find('.//testsuite')
              if testsuite is not None:
                  tests = int(testsuite.get('tests', 0))
                  failures = int(testsuite.get('failures', 0))
                  errors = int(testsuite.get('errors', 0))
                  skipped = int(testsuite.get('skipped', 0))
                  passed = tests - failures - errors - skipped
                  
                  print(f"{tests},{passed},{failures},{errors},{skipped}")
              else:
                  print("0,0,0,0,0")
          except Exception as e:
              print(f"0,0,0,0,0", file=sys.stderr)
              print(f"Error: {e}", file=sys.stderr)
          PYEOF
              
              if [ -f /tmp/test_summary.txt ]; then
                IFS=',' read -r total_tests passed failed errors skipped < /tmp/test_summary.txt
              fi
            fi
          fi

          # Calculate success rate
          success_rate=0
          if [ $total_tests -gt 0 ]; then
            success_rate=$(( passed * 100 / total_tests ))
          fi

          # Generate markdown summary
          {
            echo "# MindsDB Files Handler Test Results"
            echo ""
            echo "## Summary"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Total Tests | $total_tests |"
            echo "| ✅ Passed | $passed |"
            echo "| ❌ Failed | $failed |"
            echo "| ⚠️ Errors | $errors |"
            echo "| ⏭️ Skipped | $skipped |"
            echo "| Success Rate | ${success_rate}% |"
            echo ""
            
            # Overall status
            if [ $total_tests -eq 0 ]; then
              echo "## ⚠️ No Tests Found"
              echo ""
              echo "No test results were generated. Please check your test configuration."
              
            elif [ $passed -eq $total_tests ]; then
              echo "## 🎉 All Tests Passed!"
              echo ""
              echo "The MindsDB Files handler is working correctly with all tests."
              
            elif [ $passed -gt 0 ]; then
              echo "## ⚠️ Partial Success"
              echo ""
              echo "Some tests passed but issues were detected. Please review failed tests."
              
            else
              echo "## ❌ All Tests Failed"
              echo ""
              echo "The MindsDB Files handler has critical issues. Please review the test logs."
            fi
            
            
            # Add test execution details if available
            if [ -f /tmp/test_results/junit.xml ]; then
              echo "## Test Details"
              echo ""
              python3 <<'PYEOF'
          import xml.etree.ElementTree as ET

          try:
              tree = ET.parse('/tmp/test_results/junit.xml')
              root = tree.getroot()
              
              print("| Test Name | Status | Duration |")
              print("|-----------|--------|----------|")
              
              for testcase in root.findall('.//testcase'):
                  name = testcase.get('name', 'Unknown')
                  classname = testcase.get('classname', '')
                  time = float(testcase.get('time', 0))
                  
                  # Get short name without full path
                  if '::' in name:
                      short_name = name.split('::')[-1]
                  else:
                      short_name = name
                  
                  # Check status
                  if testcase.find('failure') is not None:
                      status = "❌ Failed"
                  elif testcase.find('error') is not None:
                      status = "⚠️ Error"
                  elif testcase.find('skipped') is not None:
                      status = "⏭️ Skipped"
                  else:
                      status = "✅ Passed"
                  
                  print(f"| {short_name} | {status} | {time:.3f}s |")
          except Exception as e:
              print(f"Could not parse test details: {e}")
          PYEOF
              echo ""
              
              # Show failed test details
              echo "## Failed Test Details"
              echo ""
              python3 <<'PYEOF'
          import xml.etree.ElementTree as ET

          try:
              tree = ET.parse('/tmp/test_results/junit.xml')
              root = tree.getroot()
              
              has_failures = False
              for testcase in root.findall('.//testcase'):
                  failure = testcase.find('failure')
                  error = testcase.find('error')
                  
                  if failure is not None or error is not None:
                      if not has_failures:
                          print("| Test Name | Error Type | Message |")
                          print("|-----------|------------|---------|")
                          has_failures = True
                      
                      name = testcase.get('name', 'Unknown')
                      if '::' in name:
                          short_name = name.split('::')[-1]
                      else:
                          short_name = name
                      
                      if failure is not None:
                          error_type = failure.get('type', 'Failure')
                          message = failure.get('message', 'No message')[:100]
                      else:
                          error_type = error.get('type', 'Error')
                          message = error.get('message', 'No message')[:100]
                      
                      print(f"| {short_name} | {error_type} | {message} |")
              
              if not has_failures:
                  print("✅ **No test failures** - All tests passed successfully!")
          except Exception as e:
              print(f"Could not parse failure details: {e}")
          PYEOF
              echo ""
            fi
            
            echo "---"
            echo ""
            echo "**Analysis completed:** $(date '+%A, %B %d, %Y at %I:%M %p %Z')"
            
          } > /tmp/combined_summary.md

          # Output to GitHub Actions summary
          cat /tmp/combined_summary.md >> $GITHUB_STEP_SUMMARY

          echo "✅ Test summary generated"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mindsdb-files-test-results
          path: |
            /tmp/test_results/
            /tmp/mindsdb.log
            /tmp/combined_summary.md
          retention-days: 7

      - name: Update Files Handler README with test results
        if: always() && github.event_name != 'pull_request'
        run: |
          echo "📝 Updating files/README.md with latest test results..."
          python3 .github/scripts/update_readme.py \
            /tmp/test_results/junit.xml \
            files/README.md \
            "Files" \
            files.yml

      - name: Commit README changes
        if: always() && github.event_name != 'pull_request'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add oracle/README.md || true
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "docs(oracle): Update test results in README [skip ci]" && git push) || \
            echo "No changes to commit"

      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up..."
          if [ -n "${MINDSDB_PID:-}" ]; then
            kill ${MINDSDB_PID} || true
